version: '3.8'

services:
  # 1. Relational Database (User & Metadata storage)
  postgres:
    image: postgres:15-alpine
    container_name: codepilot-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: codepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. In-Memory Store (Caching & Task queues)
  redis:
    image: redis:7-alpine
    container_name: codepilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 3. Vector Database (Embeddings & Hybrid Search)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: codepilot-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 4. Graph Database (GraphRAG & Entity Relationships)
  neo4j:
    image: neo4j:5
    container_name: codepilot-neo4j
    environment:
      NEO4J_AUTH: neo4j/admin_password
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

# Named volumes for data persistence across container restarts
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
